# ============================================================================
# GitHub Workflow: CodeQL with Bob Explanation
# ============================================================================
#
# PURPOSE:
# This workflow combines CodeQL security scanning with Bob Shell to:
# 1. Run CodeQL analysis to detect security vulnerabilities
# 2. Use Bob Shell to explain findings in simple terms
# 3. Post detailed explanations as PR comments
# 4. Upload explanation as a downloadable artifact
#
# WORKFLOW STEPS:
# 1. Run CodeQL security scan
# 2. Fetch CodeQL alerts from GitHub API
# 3. Use Bob Shell to analyze and explain each finding
# 4. Post explanations as PR comments
# 5. Upload artifact with full explanation
#
# REQUIREMENTS:
# - GitHub Secrets:
#   * BOBSHELL_API_KEY: API key for Bob Shell
# - Permissions: security-events, pull-requests write
#
# USAGE:
# Runs automatically on PRs and push to main, plus weekly schedule
#
# ============================================================================

name: CodeQL with Bob Explanation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze with CodeQL and Bob
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,python"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Bob Shell
        run: |
          curl -fsSL https://bob.ibm.com/download/bobshell.sh | bash -s -- --package-manager npm
          if command -v bob &> /dev/null; then
            echo "Bob Shell installed"
            bob --version
          else
            echo "Bob Shell installation failed"
            exit 1
          fi

      - name: Authenticate Bob Shell
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Configuring Bob Shell authentication..."
          if [ -z "$BOBSHELL_API_KEY" ]; then
            echo "Error: BOBSHELL_API_KEY secret is not set"
            exit 1
          fi
          # Bob Shell authenticates via BOBSHELL_API_KEY environment variable
          echo "Bob Shell authentication configured successfully"

      - name: Fetch CodeQL Alerts
        id: fetch_alerts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching CodeQL alerts..."
          curl -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts" \
            > /tmp/codeql-alerts.json
          
          ALERT_COUNT=$(jq length /tmp/codeql-alerts.json)
          echo "Found ${ALERT_COUNT} alerts"
          echo "alert_count=${ALERT_COUNT}" >> $GITHUB_OUTPUT

      - name: Create Bob Prompt
        if: steps.fetch_alerts.outputs.alert_count > 0
        run: |
          cat > /tmp/bob_prompt.txt << 'PROMPT_EOF'
You are a security expert explaining CodeQL findings to developers.

## CodeQL Security Findings

The following security vulnerabilities were detected:

PROMPT_EOF
          echo '```json' >> /tmp/bob_prompt.txt
          cat /tmp/codeql-alerts.json >> /tmp/bob_prompt.txt
          echo '```' >> /tmp/bob_prompt.txt
          cat >> /tmp/bob_prompt.txt << 'PROMPT_EOF'

## Your Task

For each finding, provide:
1. Vulnerability Name and severity
2. Simple plain-English explanation of what it is
3. Why it is dangerous / what an attacker can do
4. How to fix it (specific code change)
5. A corrected code example

Be concise, practical, and developer-friendly.
PROMPT_EOF

      - name: Get Bob Explanation
        if: steps.fetch_alerts.outputs.alert_count > 0
        id: bob_explain
        env:
          BOBSHELL_API_KEY: ${{ secrets.BOBSHELL_API_KEY }}
        run: |
          echo "Getting Bob explanation..."
          # Use positional prompt (correct syntax — -p/--prompt is deprecated)
          bob --accept-license "$(cat /tmp/bob_prompt.txt)" > /tmp/bob_explanation.md 2>&1
          echo "Explanation generated ($(wc -l < /tmp/bob_explanation.md) lines)"

      - name: Write Explanation to Step Summary
        if: steps.fetch_alerts.outputs.alert_count > 0
        run: |
          echo "## 🔐 CodeQL Security Analysis — Bob Shell Explanation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Alerts found:** ${{ steps.fetch_alerts.outputs.alert_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/bob_explanation.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Explanation as Artifact
        if: steps.fetch_alerts.outputs.alert_count > 0
        uses: actions/upload-artifact@v4
        with:
          name: codeql-bob-explanation-${{ github.run_id }}
          path: /tmp/bob_explanation.md
          retention-days: 30

      - name: Post Explanation as PR Comment
        if: steps.fetch_alerts.outputs.alert_count > 0 && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let explanation = fs.readFileSync('/tmp/bob_explanation.md', 'utf8');
            
            // Truncate if needed (PR comment limit ~65k chars)
            const MAX_LENGTH = 60000;
            if (explanation.length > MAX_LENGTH) {
              explanation = explanation.substring(0, MAX_LENGTH) + '\n\n---\n⚠️ Truncated. Download full report from workflow artifacts.';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 🔐 CodeQL Security Analysis\n\n${explanation}`
            });

# Made with Bob
